<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mathphilia</title>
    <meta name="description" content="Mathphilia 공개 수학 블로그" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css"
    />
    <link rel="apple-touch-icon" sizes="57x57" href="icon/apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="icon/apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="icon/apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="icon/apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="icon/apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="icon/apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="icon/apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icon/apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192"  href="icon/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="icon/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icon/favicon-16x16.png">
    <link rel="manifest" href="icon/manifest.json">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-TileImage" content="icon/ms-icon-144x144.png">
    <meta name="theme-color" content="#ffffff">
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="brand" id="homeLogoButton" type="button" aria-label="메인으로">
          <img class="brand-logo" src="/assets/logo.png" alt="Mathphilia" />
        </button>

        <div class="back-slot">
          <button id="backButton" class="icon-button" type="button" aria-label="목록으로">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 18l-6-6 6-6" />
            </svg>
          </button>
        </div>

        <div class="search-wrap">
          <label for="searchInput">검색</label>
          <input
            id="searchInput"
            type="search"
            placeholder="제목, 저자, 태그, 본문"
            autocomplete="off"
          />
        </div>

        <div class="topbar-actions">
          <div class="theme-toggle">
            <button id="themeToggleButton" class="theme-button" type="button" aria-label="테마 전환" title="테마 전환">
              <span class="theme-icon theme-icon-light" aria-hidden="true">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="12" cy="12" r="4" />
                  <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
                </svg>
              </span>
              <span class="theme-icon theme-icon-dark" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M21 12.8A8.5 8.5 0 1 1 11.2 3 6.5 6.5 0 0 0 21 12.8Z" />
                </svg>
              </span>
            </button>
          </div>
        </div>
      </header>

      <main class="content">
        <section id="homeView" class="home-view" aria-live="polite">
          <div class="section-head">
            <div class="section-title-row">
              <h1>Posts</h1>
              <button id="writeButton" class="small-icon-button" type="button" aria-label="글쓰기" title="글쓰기">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5v14M5 12h14" />
                </svg>
              </button>
            </div>
            <span id="postCount" class="count-pill">전체 글: 0개</span>
          </div>
          <div id="postList" class="post-grid"></div>
        </section>

        <article id="postView" class="post-view" aria-live="polite" hidden></article>
      </main>

      <footer class="site-footer">강원과학고등학교 수학 동아리 Mathphilia</footer>
    </div>

    <dialog id="passwordDialog" class="modal">
      <form id="passwordForm" method="dialog">
        <h2>쓰기 잠금 해제</h2>
        <p>비밀번호를 입력하면 글을 작성하고 수정할 수 있습니다.</p>
        <input
          id="passwordInput"
          type="password"
          placeholder="비밀번호"
          autocomplete="current-password"
          required
        />
        <p id="passwordError" class="error-text" role="alert"></p>
        <div class="modal-actions">
          <button class="ghost-button" value="cancel" type="button" id="cancelPassword">
            취소
          </button>
          <button class="primary-button" value="confirm" type="submit">확인</button>
        </div>
      </form>
    </dialog>

    <dialog id="editorDialog" class="editor-modal">
      <form id="editorForm" method="dialog">
        <div class="editor-head">
          <div>
            <p class="club">Mathphilia Archive</p>
            <h2 id="editorTitle">새 글</h2>
          </div>
          <button class="icon-button" id="closeEditor" type="button" aria-label="닫기">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18M6 6l12 12" />
            </svg>
          </button>
        </div>

        <div class="editor-grid">
          <label>
            제목
            <input id="titleInput" type="text" required />
          </label>
          <label>
            저자
            <input id="authorInput" type="text" placeholder="이름 또는 팀명" />
          </label>
          <label>
            태그
            <input id="tagsInput" type="text" placeholder="정수론, 기하, 세미나" />
          </label>
          <label class="wide">
            본문
            <textarea
              id="bodyInput"
              rows="18"
              required
              placeholder="LaTeX 예시: $e^{i\pi}+1=0$, $$\sum_{k=1}^{n} k=\frac{n(n+1)}{2}$$"
            ></textarea>
          </label>
        </div>

        <p id="editorError" class="error-text" role="alert"></p>
        <div class="editor-actions">
          <button id="deleteButton" class="danger-button" type="button">삭제</button>
          <div>
            <button class="ghost-button" id="previewButton" type="button">미리보기</button>
            <button class="primary-button" id="saveButton" type="submit">저장</button>
          </div>
        </div>
      </form>
    </dialog>

    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/contrib/auto-render.min.js"
    ></script>
    <script defer src="/app.js?v=20260617-markdown-native"></script>
  </body>
</html>
